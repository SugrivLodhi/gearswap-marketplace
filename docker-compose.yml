version: '3.9'

services:
  # ── Kafka Infrastructure ────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: gearswap-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gearswap-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gearswap-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - '8080:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: gearswap
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── Notification Service (Kafka Consumer) ──────────────────────────────────
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: gearswap-notification-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-notification-service
      KAFKA_GROUP_ID: notification-service
    depends_on:
      kafka:
        condition: service_started

  # ── Search Indexer Service (Kafka Consumer) ────────────────────────────────
  search-indexer-service:
    build:
      context: ./search-indexer-service
      dockerfile: Dockerfile
    container_name: gearswap-search-indexer-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-search-indexer
      KAFKA_GROUP_ID: search-indexer
      MONGODB_URI: mongodb://mongo:27017/gearswap
      DATABASE_NAME: gearswap
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: typesense-secret-key-gearswap
    depends_on:
      kafka:
        condition: service_started
      mongo:
        condition: service_healthy
      typesense:
        condition: service_started

  # ── Payment Service (Kafka + Webhook endpoint) ─────────────────────────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: gearswap-payment-service
    restart: unless-stopped
    ports:
      - '9001:9001'
    environment:
      NODE_ENV: production
      PORT: 9001
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-payment-service
      KAFKA_GROUP_ID: payment-service
    depends_on:
      kafka:
        condition: service_started

  # ── Analytics Service (CQRS read model sink) ───────────────────────────────
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: gearswap-analytics-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-analytics-service
      KAFKA_GROUP_ID: analytics-service
      MONGODB_URI: mongodb://mongo:27017/gearswap
      DATABASE_NAME: gearswap
    depends_on:
      kafka:
        condition: service_started
      mongo:
        condition: service_healthy

  # ── Catalog Service (inventory + catalog events) ───────────────────────────
  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: gearswap-catalog-service
    restart: unless-stopped
    ports:
      - '9002:9002'
    environment:
      NODE_ENV: production
      PORT: 9002
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-catalog-service
      KAFKA_GROUP_ID: catalog-service
      MONGODB_URI: mongodb://mongo:27017/gearswap
      DATABASE_NAME: gearswap
    depends_on:
      kafka:
        condition: service_started
      mongo:
        condition: service_healthy

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gearswap-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    # Enable AOF persistence so jobs survive Redis restarts
    command: redis-server --appendonly yes --appendfsync everysec
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: gearswap-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gearswap
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gearswap-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_URI: mongodb://mongo:27017/gearswap
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: typesense-secret-key-gearswap
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-api
      TYPESENSE_SYNC_MODE: event
      INVENTORY_RESERVATION_MODE: shadow
      INVENTORY_RESERVATION_TIMEOUT_MS: 8000
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      typesense:
        condition: service_started
      kafka:
        condition: service_started
    command: node dist/index.js

  # ── Worker Process ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gearswap-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MONGODB_URI: mongodb://mongo:27017/gearswap
      WORKER_EMAIL_CONCURRENCY: 5
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: typesense-secret-key-gearswap
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-worker
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      typesense:
        condition: service_started
      kafka:
        condition: service_started
    # Worker runs the worker entry point, NOT the API server
    command: node dist/workers/index.js

  # ── Typesense ──────────────────────────────────────────────────────────────
  typesense:
    image: typesense/typesense:26.0
    container_name: gearswap-typesense
    restart: unless-stopped
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=typesense-secret-key-gearswap --enable-cors=true'
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "test -d /data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Admin API (FastAPI) ───────────────────────────────────────────────────
  admin-api:
    build:
      context: ./admin-backend
      dockerfile: Dockerfile
    container_name: gearswap-admin-api
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      MONGODB_URI: mongodb://mongo:27017/gearswap
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CORS_ORIGINS: http://localhost:3000
      KAFKA_ENABLED: 'true'
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: gearswap-admin-api
      CATALOG_SERVICE_BASE_URL: http://catalog-service:9002
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  redis_data:
  mongo_data:
  typesense_data:
